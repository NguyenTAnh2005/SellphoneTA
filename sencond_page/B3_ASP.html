<body>
    <div class="container card mt-4 border border-primary border-2 rounded-2">
        <h2 class="text-center bg-warning text-primary">Thong tin nha tuyen dung</h2>
        <form action="" method="post">
            <div class="row">
                <div class="col-12 col-md-4 form-floating mb-4">
                    <input type="text" class="form-control" id="f1_ip1" name="EmployerName" placeholder="">

                </div>
                <div class="col-12 col-md-5 form-floating md-4">
                    <label for="f1_ip2" class="form-label"></label>
                    <select name="TypeCompany" id="f1_ip2" class="form-select">
                        <option value="" hidden selected disabled>Chon Loai hinh doanh nghiep</option>
                    </select>
                </div>
                <div class="col-12 col-md-3 form-floating md-4">
                    <input type="text" class="form-control" id="f1_ip3" name="CountStaff" placeholder="">
                    <label for="f1_ip3" class="ms-2 form-label text-black">So luong nhan vien</label>
                </div>
            </div>
        </form>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
